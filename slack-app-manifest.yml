display_information:
  name: Slack Thread Monitor
  description: Personal Slack thread Kanban queue
  background_color: "#22577a"
features:
  bot_user:
    display_name: Thread Monitor
    always_online: false
  shortcuts:
    - name: Resolve thread
      type: message
      callback_id: resolve_thread
      description: Move this Slack thread to Resolved
    - name: Wait for reply
      type: message
      callback_id: wait_for_reply
      description: Move this Slack thread to Awaiting Reply
oauth_config:
  scopes:
    bot:
      - channels:history
      - channels:read
      - groups:history
      - groups:read
      - im:history
      - im:read
      - mpim:history
      - mpim:read
      - users:read
      - commands
settings:
  event_subscriptions:
    bot_events:
      - message.channels
      - message.groups
      - message.im
      - message.mpim
  interactivity:
    is_enabled: true
  org_deploy_enabled: false
  socket_mode_enabled: true
  token_rotation_enabled: false
